    Fingerprint: sha256:b01c61712234da5ae5fb614ac38282bd58b47341eb60a10f02c26e575a34bfe3
    Title: 'sed: GNU sed TOCTOU race condition'
    Description: "When sed is invoked with both -i (in-place edit) and --follow-symlinks, the function open_next_file() performs two separate, non-atomic filesystem operations on the same path: \n1. resolves symlink to its target and stores\_the resolved path for determining when output is written,\n2. opens the original symlink path\_(not the resolved one) to read the file. \nBetween these two calls there is a race window. If an attacker atomically replaces the symlink with a different target during that window, sed will: read content from the new (attacker-chosen) symlink target and write the processed result to the path recorded in step 1.\_This can lead to arbitrary file overwrite with attacker-controlled content in the context of the sed process.\n\n\nThis issue was fixed in version 4.10."
    Severity: MEDIUM
